<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="DeskRAG">
  <defs>
    <linearGradient id="dr-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#F3EEFF"/>
      <stop offset="1" stop-color="#A18AF5"/>
    </linearGradient>
    <radialGradient id="dr-shadow">
      <stop offset="0" stop-color="#6D5BD0" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#6D5BD0" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#6D5BD0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes dr-bob {
      0%   { transform: translateY(0); }
      25%  { transform: translateY(-8px); }
      50%  { transform: translateY(0); }
      75%  { transform: translateY(8px); }
      100% { transform: translateY(0); }
    }
    @keyframes dr-shadow {
      0%   { transform: scale(0.93); opacity: 0.821; }
      25%  { transform: scale(0.86); opacity: 0.643; }
      50%  { transform: scale(0.93); opacity: 0.821; }
      75%  { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.93); opacity: 0.821; }
    }
    .dr-bob { animation: dr-bob 3s ease-in-out infinite; }
    .dr-shadow {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: dr-shadow 3s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .dr-bob, .dr-shadow { animation: none; }
    }
  </style>
  <rect x="20" y="213" width="216" height="7" rx="3.5" fill="#8A93A3" fill-opacity="0.55"/>
  <ellipse cx="128" cy="216" rx="56" ry="11" fill="url(#dr-shadow)" class="dr-shadow"/>
